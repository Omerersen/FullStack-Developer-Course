<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
  <title>Birthday</title>
</head>
<body>
  <div class="container">
    <h1 class="birthday">Today is Ömer's birthday 🎉</h1>
    <img 
    src="İmages/image.png" 
    alt="This person is Ömer with a smile"
    id="me">
    <h2 class="age">20 years old.</h2>
    <h3 class="day">29.11.2026</h3>
  </div>

  <div class="gift-section-happy">
    <h2 class="gift-title">Here's how happy I am for you today 🥳</h2>
    <h3 class="gift-hint">(Hover over the gift)</h3>
    <div class="gift-cover-img" id="gift-happy-img"> </div>
  </div>

  <div class="gift-section-hot">
    <h2 class="react-people">
      How people react when you enter the room 😍
    </h2>
    <div class="gift-cover-img" id="gift-hot-img"></div>
  </div>

    <div class="gift-section-genius">
    <h2 class="react-people">
      İf I had to describe you with one word
    </h2>
    <div class="gift-cover-img" id="gift-genius-img"></div>
  </div>

  <div class="gift-section-badass">
    <h2 class="react-people">
      The Only person as badass as you
    </h2>
    <div class="gift-cover-img" id="gift-badass-img"></div>
  </div>

  <div class="gift-section-cheers">
    <h2 class="react-people">
      This one's for you, my friend 
    </h2>
    <div class="gift-cover-img" id="gift-cheers-img"></div>
  </div>

</body>
</html>
